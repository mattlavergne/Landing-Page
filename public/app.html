<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>mattOS · App</title>
<meta name="description" content="A project by Matt Lavergne, running as an app on the mattOS desktop.">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#eef1f7" id="metaTheme">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<script>
/* Injected by the Worker (see src/index.js). */
window.__APP__ = __APP_CONFIG__;
/* Set the theme before first paint so there is no flash. Shares the same
   localStorage keys as the mattOS desktop, so the app matches the visitor's
   chosen appearance. */
(function(){
  try{
    var m = localStorage.getItem("mattos-theme") || "auto";
    var dark = m==="dark" || (m==="auto" && window.matchMedia("(prefers-color-scheme: dark)").matches);
    document.documentElement.setAttribute("data-theme", dark?"dark":"light");
  }catch(e){ document.documentElement.setAttribute("data-theme","light"); }
})();
</script>
<style>
/* ══════════════════════════════════════════════════════════════════
   mattOS app frame: the same liquid-glass desktop as the landing page,
   showing a single project as a maximized browser-style window. One shell
   serves every framed project (see the APPS registry in src/index.js).
════════════════════════════════════════════════════════════════════ */
:root{
  --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  --bg:#e9edf5;
  --panel: rgba(255,255,255,0.62);
  --panel-strong: rgba(255,255,255,0.80);
  --panel-solid:#ffffff;
  --panel-border: rgba(255,255,255,0.55);
  --edge: inset 0 1px 0 rgba(255,255,255,0.85), inset 0 0 0 0.5px rgba(255,255,255,0.35);
  --sheen: linear-gradient(155deg, rgba(255,255,255,0.55), rgba(255,255,255,0.06) 42%, transparent 60%);
  --glass-blur: blur(34px) saturate(1.7);
  --hairline: rgba(15,23,42,0.08);
  --text:#0f172a;
  --text-2: rgba(15,23,42,0.62);
  --text-3: rgba(15,23,42,0.42);
  --accent:#2563eb;
  --accent-2:#7c5cff;
  --chip: rgba(15,23,42,0.05);
  --chip-hover: rgba(15,23,42,0.09);
  --bar-track: rgba(15,23,42,0.09);
  --good:#16a34a;
  --shadow: 0 30px 80px rgba(15,23,42,0.28), 0 4px 14px rgba(15,23,42,0.10);
  --shadow-sm: 0 6px 20px rgba(15,23,42,0.12);
  --menubar-h:30px;
  --wb1:#5eead4; --wb2:#818cf8; --wb3:#c084fc; --wb4:#f0abfc; --wb5:#38bdf8;
  --wall-dim:0;
}
html[data-theme="dark"]{
  --bg:#070b16;
  --panel: rgba(17,24,39,0.55);
  --panel-strong: rgba(17,24,39,0.76);
  --panel-solid:#111827;
  --panel-border: rgba(148,163,184,0.20);
  --edge: inset 0 1px 0 rgba(255,255,255,0.12), inset 0 0 0 0.5px rgba(255,255,255,0.05);
  --sheen: linear-gradient(155deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02) 42%, transparent 60%);
  --hairline: rgba(148,163,184,0.12);
  --text:#e5e9f0;
  --text-2: rgba(226,232,240,0.64);
  --text-3: rgba(226,232,240,0.40);
  --accent:#60a5fa;
  --accent-2:#a78bfa;
  --chip: rgba(148,163,184,0.10);
  --chip-hover: rgba(148,163,184,0.18);
  --bar-track: rgba(148,163,184,0.16);
  --good:#4ade80;
  --shadow: 0 34px 90px rgba(0,0,0,0.66), 0 4px 14px rgba(0,0,0,0.4);
  --shadow-sm: 0 6px 20px rgba(0,0,0,0.45);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);overflow:hidden;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;
  -webkit-tap-highlight-color:transparent}
button{font-family:inherit;color:inherit}
a{color:inherit;text-decoration:none}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* ── wallpaper (identical vocabulary to the desktop) ── */
#wallpaper{position:fixed;inset:0;z-index:0;overflow:hidden;background:var(--bg)}
#wallpaper .blob{position:absolute;border-radius:50%;filter:blur(60px);opacity:.85;will-change:transform}
html[data-theme="dark"] #wallpaper .blob{opacity:.5;filter:blur(72px)}
.blob.b1{width:52vw;height:52vw;left:-10vw;top:-12vh;background:radial-gradient(circle at 30% 30%,var(--wb1),transparent 68%);animation:drift1 26s ease-in-out infinite}
.blob.b2{width:46vw;height:46vw;right:-8vw;top:-6vh;background:radial-gradient(circle at 60% 40%,var(--wb2),transparent 68%);animation:drift2 32s ease-in-out infinite}
.blob.b3{width:50vw;height:50vw;left:14vw;bottom:-22vh;background:radial-gradient(circle at 40% 60%,var(--wb3),transparent 68%);animation:drift3 30s ease-in-out infinite}
.blob.b4{width:40vw;height:40vw;right:2vw;bottom:-16vh;background:radial-gradient(circle at 50% 50%,var(--wb4),transparent 68%);animation:drift4 36s ease-in-out infinite}
.blob.b5{width:34vw;height:34vw;left:38vw;top:24vh;background:radial-gradient(circle at 50% 50%,var(--wb5),transparent 70%);animation:drift5 40s ease-in-out infinite}
@keyframes drift1{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(6vw,5vh) scale(1.12)}}
@keyframes drift2{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-5vw,7vh) scale(1.08)}}
@keyframes drift3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(4vw,-6vh) scale(1.14)}}
@keyframes drift4{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-6vw,-4vh) scale(1.1)}}
@keyframes drift5{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-4vw,6vh) scale(1.18)}}
#wallpaper::after{content:"";position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(120% 120% at 50% 120%, rgba(15,23,42,.14), transparent 60%),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.5'/></svg>");
  background-size:auto, 160px 160px; opacity:.5; mix-blend-mode:overlay}
#wallDim{position:fixed;inset:0;z-index:1;pointer-events:none;background:#000;opacity:var(--wall-dim);transition:opacity .3s ease}

/* ── menu bar (mirrors the desktop's) ── */
#menubar{position:fixed;top:0;left:0;right:0;height:var(--menubar-h);z-index:50;
  display:flex;align-items:center;gap:2px;padding:0 6px;font-size:13px;color:var(--text);
  background:var(--panel);border-bottom:1px solid var(--panel-border);box-shadow:var(--edge);
  backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur)}
.mb-item{display:inline-flex;align-items:center;gap:6px;height:22px;padding:0 9px;border-radius:7px;
  cursor:pointer;white-space:nowrap;transition:background .12s ease;background:none;border:0;color:inherit}
.mb-item:hover{background:var(--chip-hover)}
.mb-logo svg{width:15px;height:15px;display:block}
.mb-app{font-weight:700;cursor:default}
.mb-app:hover{background:none}
.mb-spacer{flex:1}
.mb-tray{display:inline-flex;align-items:center;gap:0}
.mb-tray .mb-item{padding:0 7px;gap:5px}
.tray-ico{width:16px;height:16px;display:block;opacity:.9}
#mbClock{font-variant-numeric:tabular-nums;font-weight:500;cursor:default}
#batPct{font-size:12px;font-variant-numeric:tabular-nums}
@media(max-width:640px){
  #mbHome span{display:none}
  #trayWifi,#batPct{display:none}
}
@media(max-width:420px){#mbApp{display:none}}

/* ── Control Center popover (ported from the desktop) ── */
#control{position:fixed;top:calc(var(--menubar-h) + 6px);right:6px;z-index:60;width:300px;display:none;
  background:var(--panel-strong);border:1px solid var(--panel-border);border-radius:20px;padding:14px;
  box-shadow:var(--shadow),var(--edge);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  animation:pop-in .16s cubic-bezier(.34,1.3,.64,1)}
#control.on{display:block}
@keyframes pop-in{from{opacity:0;transform:translateY(-6px) scale(.97)}to{opacity:1;transform:none}}
.cc-grid{display:grid;gap:10px}
.cc-tile{background:var(--chip);border:1px solid var(--panel-border);border-radius:14px;padding:12px;box-shadow:var(--edge)}
.cc-h{font-size:11px;color:var(--text-3);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.seg{display:flex;background:var(--bar-track);border-radius:9px;padding:2px}
.seg button{all:unset;flex:1;text-align:center;font-size:12px;font-weight:600;padding:7px 0;border-radius:7px;cursor:pointer;color:var(--text-2)}
.seg button.on{background:var(--accent);color:#fff}
.cc-slider{display:flex;align-items:center;gap:10px}
.cc-slider svg{width:16px;height:16px;color:var(--text-3);flex:none}
.cc-slider input[type=range]{flex:1;-webkit-appearance:none;appearance:none;height:6px;border-radius:6px;background:var(--bar-track);outline:none}
.cc-slider input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.35);cursor:pointer}
.cc-slider input[type=range]::-moz-range-thumb{width:20px;height:20px;border:none;border-radius:50%;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.35);cursor:pointer}
.wall-swatches{display:flex;gap:8px}
.wall-swatches button{all:unset;flex:1;height:34px;border-radius:10px;cursor:pointer;border:2px solid transparent;box-shadow:var(--edge)}
.wall-swatches button.on{border-color:var(--accent)}
@media(max-width:640px){#control{left:6px;right:6px;width:auto}}

/* ── the app window (browser-style, maximized by default) ── */
#win{position:fixed;z-index:10;top:var(--menubar-h);left:0;right:0;bottom:0;width:100%;
  display:flex;flex-direction:column;overflow:hidden;
  background:var(--panel-strong);border:1px solid var(--panel-border);border-top:0;
  box-shadow:var(--shadow),var(--edge);
  backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
  animation:win-open .3s cubic-bezier(.34,1.28,.64,1)}
@keyframes win-open{from{opacity:0;transform:scale(.985) translateY(8px)}to{opacity:1;transform:none}}
/* zoom -> a smaller floating window (centered with margins, so the transform
   stays free for the open/close/minimize animations) */
#win.windowed{top:calc(var(--menubar-h) + 16px);bottom:16px;left:0;right:0;
  width:min(1180px, calc(100vw - 32px));margin-inline:auto;
  border:1px solid var(--panel-border);border-radius:16px}
#win.closing{animation:win-close .2s ease forwards;pointer-events:none}
@keyframes win-close{to{opacity:0;transform:scale(.97)}}
#win.min{animation:win-min .34s cubic-bezier(.5,0,.7,.4) forwards;pointer-events:none}
@keyframes win-min{to{opacity:0;transform:translateY(62vh) scale(.18)}}
@media(max-width:640px){
  /* On phones there is no room for a floating window: always full-bleed. */
  #win.windowed{top:var(--menubar-h);bottom:0;width:100%;margin:0;border:1px solid var(--panel-border);border-top:0;border-radius:0}
}

/* browser toolbar */
.wbar{height:46px;flex:none;display:flex;align-items:center;gap:12px;padding:0 12px;
  border-bottom:1px solid var(--hairline);position:relative;z-index:2}
.lights{display:flex;gap:9px;align-items:center;flex:none}
.wl{width:13px;height:13px;border-radius:50%;border:0;cursor:pointer;position:relative;padding:0;
  display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 0 .5px rgba(0,0,0,.18)}
.wl.close{background:#ff5f57}.wl.min{background:#febc2e}.wl.zoom{background:#28c840}
.wl svg{width:9px;height:9px;opacity:0;transition:opacity .1s;color:rgba(0,0,0,.55)}
.lights:hover .wl svg{opacity:1}
.wl::after{content:"";position:absolute;inset:-8px}   /* larger hit area */
.addr{flex:1;min-width:0;display:flex;align-items:center;gap:7px;justify-content:center;
  height:30px;padding:0 14px;border-radius:9px;background:var(--chip);color:var(--text-2);
  font-size:12.5px;max-width:520px;margin:0 auto;overflow:hidden}
.addr .lock{width:12px;height:12px;flex:none;opacity:.7}
.addr .u{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.addr .u b{color:var(--text);font-weight:600}
.tbtn{flex:none;width:34px;height:34px;border-radius:8px;border:0;background:none;cursor:pointer;
  color:var(--text-2);display:flex;align-items:center;justify-content:center;transition:background .12s ease}
.tbtn:hover{background:var(--chip);color:var(--text)}
.tbtn svg{width:17px;height:17px}

/* window body + iframe */
.wbody{flex:1;position:relative;background:var(--panel-solid);z-index:1}
#frame{position:absolute;inset:0;width:100%;height:100%;border:0;display:block}
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;color:var(--text-2);font-size:13px;background:var(--panel-solid);z-index:2;transition:opacity .35s ease}
#loading.hide{opacity:0;pointer-events:none}
.spinner{width:30px;height:30px;border-radius:50%;border:3px solid var(--chip);border-top-color:var(--accent);
  animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* touch: bigger, more forgiving targets */
@media(pointer:coarse){
  .wbar{height:52px}
  .lights{gap:13px}
  .wl{width:15px;height:15px}
  .wl::after{inset:-12px}
  .mb-item{padding:0 8px}
}
@media(prefers-reduced-motion:reduce){
  *{animation-duration:.001ms!important;animation-iteration-count:1!important}
  #wallpaper .blob{animation:none}
  .spinner{animation:spin 1.2s linear infinite}
}
</style>
</head>
<body>
<div id="wallpaper" aria-hidden="true">
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>
  <div class="blob b4"></div><div class="blob b5"></div>
</div>
<div id="wallDim" aria-hidden="true"></div>

<header id="menubar">
  <button class="mb-item mb-logo" id="mbHome" title="Back to the desktop" aria-label="Back to the desktop">
    <svg viewBox="0 0 100 100" fill="currentColor"><path d="M24 74V26h9l17 24 17-24h9v48H64V47L50 68 36 47v27z"/></svg>
    <span>Desktop</span>
  </button>
  <span class="mb-item mb-app" id="mbApp">App</span>
  <div class="mb-spacer"></div>
  <div class="mb-tray">
    <button class="mb-item" id="trayControl" title="Control Center" aria-label="Control Center"><span class="tray-ico" id="icoControl"></span></button>
    <span class="mb-item" id="trayWifi" title="Wi-Fi" style="cursor:default"><span class="tray-ico" id="icoWifi"></span></span>
    <button class="mb-item" id="mbTheme" title="Appearance" aria-label="Toggle appearance"><span class="tray-ico" id="icoTheme"></span></button>
    <span class="mb-item" id="trayBattery" title="Battery" style="cursor:default"><span class="tray-ico" id="icoBattery"></span><span id="batPct">100%</span></span>
    <button class="mb-item" id="mbClock" aria-label="Time">--:--</button>
  </div>
</header>

<div id="control" role="dialog" aria-label="Control Center">
  <div class="cc-grid">
    <div class="cc-tile">
      <div class="cc-h">Appearance</div>
      <div class="seg" id="ccSeg">
        <button data-theme-seg="auto">Auto</button>
        <button data-theme-seg="light">Light</button>
        <button data-theme-seg="dark">Dark</button>
      </div>
    </div>
    <div class="cc-tile">
      <div class="cc-h">Wallpaper</div>
      <div class="wall-swatches" id="ccWall"></div>
    </div>
    <div class="cc-tile">
      <div class="cc-h">Brightness</div>
      <div class="cc-slider" id="ccBrightWrap"></div>
    </div>
  </div>
</div>

<section id="win" role="dialog" aria-label="Application window">
  <div class="wbar">
    <div class="lights">
      <button class="wl close" id="btnClose" aria-label="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M6 6l12 12M18 6 6 18"/></svg></button>
      <button class="wl min" id="btnMin" aria-label="Minimize"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><path d="M5 12h14"/></svg></button>
      <button class="wl zoom" id="btnZoom" aria-label="Zoom"></button>
    </div>
    <div class="addr">
      <svg class="lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
      <span class="u" id="addrText"></span>
    </div>
    <button class="tbtn" id="btnPop" title="Open full screen in a new tab" aria-label="Open in a new tab">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 4h6v6"/><path d="M20 4 10 14"/><path d="M20 14v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h4"/></svg>
    </button>
  </div>
  <div class="wbody">
    <div id="loading"><div class="spinner"></div><div id="loadingText">Loading…</div></div>
    <iframe id="frame" title="Application" allow="geolocation; fullscreen"></iframe>
  </div>
</section>

<noscript>
  <div style="position:fixed;inset:40px;font-family:system-ui,sans-serif">
    This app runs on the mattOS desktop, which needs JavaScript.

  </div>
</noscript>

  };

  var PAL_NAMES = Object.keys(PALETTES);

    var m = themeMode();
    var dark = m==="dark" || (m==="auto" && mqDark.matches);
    document.documentElement.setAttribute("data-theme", dark?"dark":"light");
    if(APP.accent) document.documentElement.style.setProperty("--accent", APP.accent);
    var mt=$("#metaTheme"); if(mt) mt.setAttribute("content", dark?"#070b16":"#eef1f7");
    var ti=$("#icoTheme"); if(ti) ti.innerHTML = m==="auto"?ICON.auto:(dark?ICON.moon:ICON.sun);
    document.querySelectorAll("[data-theme-seg]").forEach(function(b){ b.classList.toggle("on", b.dataset.themeSeg===m); });
  }
  function setTheme(m){ set("mattos-theme",m); applyTheme(); }
  function cycleTheme(){ var o=["auto","light","dark"]; setTheme(o[(o.indexOf(themeMode())+1)%o.length]); }
  function applyWall(){
    var name = get("mattos-wall","Aurora");
    var c = PALETTES[name]||PALETTES.Aurora, r=document.documentElement.style;
    c.forEach(function(col,i){ r.setProperty("--wb"+(i+1),col); });
    document.querySelectorAll("[data-wall]").forEach(function(b){ b.classList.toggle("on", b.dataset.wall===name); });
  }
  function setWall(n){ set("mattos-wall",n); applyWall(); }
  function applyBright(){
    var b = +get("mattos-bright","100"); if(isNaN(b)) b=100;
    document.documentElement.style.setProperty("--wall-dim", ((100-b)/100*0.55).toFixed(3));
  }
  mqDark.addEventListener("change", applyTheme);

  // static tray icons
  $("#icoControl").innerHTML = ICON.control;
  $("#icoWifi").innerHTML = ICON.wifi;
  $("#icoBattery").innerHTML = ICON.battery;

  // build Control Center controls
  $("#ccWall").innerHTML = PAL_NAMES.map(function(n){
    return '<button data-wall="'+n+'" title="'+n+'" style="background:linear-gradient(135deg,'+PALETTES[n][0]+','+PALETTES[n][2]+','+PALETTES[n][4]+')"></button>';
  }).join("");
  $("#ccBrightWrap").innerHTML = ICON.sun + '<input type="range" id="ccBright" min="35" max="100" value="'+(+get("mattos-bright","100")||100)+'">' + ICON.sun;

  applyTheme(); applyWall(); applyBright();

  document.querySelectorAll("[data-theme-seg]").forEach(function(b){ b.addEventListener("click", function(){ setTheme(b.dataset.themeSeg); }); });
  document.querySelectorAll("[data-wall]").forEach(function(b){ b.addEventListener("click", function(){ setWall(b.dataset.wall); }); });
  $("#ccBright").addEventListener("input", function(e){ set("mattos-bright", e.target.value); applyBright(); });
  $("#mbTheme").addEventListener("click", cycleTheme);

  var control = $("#control");
  function toggleControl(){ control.classList.toggle("on"); }
  $("#trayControl").addEventListener("click", function(e){ e.stopPropagation(); toggleControl(); });
  control.addEventListener("click", function(e){ e.stopPropagation(); });
  document.addEventListener("click", function(e){
    if(!e.target.closest("#control") && !e.target.closest("#trayControl")) control.classList.remove("on");
  });

  /* ── clock ── */
  function tick(){ var c=$("#mbClock"); if(c) c.textContent=new Date().toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"}); }
  tick(); setInterval(tick,1000);

  /* ── populate window from the injected app config ── */
  document.title = (APP.title||"App") + " · mattlavergne.com";
  var mbApp=$("#mbApp"); if(mbApp) mbApp.textContent = APP.title || "App";
  var addr=$("#addrText");
  if(addr){
    var a = APP.address || (location.host + location.pathname);
    var slash = a.indexOf("/");
    addr.innerHTML = slash>=0 ? "<b>"+esc(a.slice(0,slash))+"</b>"+esc(a.slice(slash)) : "<b>"+esc(a)+"</b>";
  }
  var lt=$("#loadingText"); if(lt && APP.title) lt.textContent = "Loading "+APP.title+"…";

  var frame=$("#frame"), loading=$("#loading");
  var embed = APP.embed || "/";

  // The embedded content is same-origin (proxied through this domain), so we can
  // keep its hash in sync with the address URL. That preserves the app's
  // shareable deep links: mattlavergne.com/trafficmap#… loads the right view,
  // and interacting with the app keeps that URL up to date and copyable.
  function syncHashFromFrame(){
    try{
      var h = frame.contentWindow.location.hash || "";
      if(h !== location.hash) history.replaceState(null, "", location.pathname + location.search + h);
    }catch(e){}
  }
  frame.addEventListener("load", function(){
    if(loading) loading.classList.add("hide");
    syncHashFromFrame();
    try{ frame.contentWindow.addEventListener("hashchange", syncHashFromFrame); }catch(e){}
  });
  window.addEventListener("hashchange", function(){
    try{ var iwin=frame.contentWindow; if(iwin && iwin.location.hash!==location.hash) iwin.location.hash=location.hash; }catch(e){}
  });
  // Kick off the embedded content, carrying any incoming deep-link hash.
  frame.src = embed + location.hash;

  /* ── window controls ── */
  var win=$("#win"), btnZoom=$("#btnZoom");
  function updateZoomIcon(){ btnZoom.innerHTML = win.classList.contains("windowed") ? ZOOM.expand : ZOOM.restore; }
  updateZoomIcon();
  function goHome(){ location.href = "/"; }
  $("#mbHome").addEventListener("click", goHome);
  $("#btnClose").addEventListener("click", function(){ win.classList.add("closing"); setTimeout(goHome, 190); });
  $("#btnMin").addEventListener("click", function(){ win.classList.add("min"); setTimeout(goHome, 330); });
  btnZoom.addEventListener("click", function(){ win.classList.toggle("windowed"); updateZoomIcon(); });
  $(".wbar").addEventListener("dblclick", function(e){
    if(!e.target.closest(".wl") && !e.target.closest(".tbtn")){ win.classList.toggle("windowed"); updateZoomIcon(); }
  });
  $("#btnPop").addEventListener("click", function(){ window.open(embed + location.hash, "_blank", "noopener"); });

  // Esc: close Control Center first, otherwise return to the desktop.
  document.addEventListener("keydown", function(e){
    if(e.key!=="Escape") return;
    if(control.classList.contains("on")) control.classList.remove("on");
    else $("#btnClose").click();
  });
})();
</script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
  <radialGradient id="bg" cx="50%" cy="42%" r="72%">
    <stop offset="0" stop-color="#16223c"/>
    <stop offset="0.55" stop-color="#0c1220"/>
    <stop offset="1" stop-color="#05080f"/>
  </radialGradient>
  <radialGradient id="halo" cx="50%" cy="50%" r="50%">
    <stop offset="0" stop-color="rgba(79,208,224,0.55)"/>
    <stop offset="0.45" stop-color="rgba(51,150,190,0.22)"/>
    <stop offset="1" stop-color="rgba(21,150,173,0)"/>
  </radialGradient>
  <linearGradient id="spec" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#6fe0ef"/>
    <stop offset="0.5" stop-color="#1596ad"/>
    <stop offset="1" stop-color="#6a58d8"/>
  </linearGradient>
  <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="rgba(111,224,239,0.9)"/>
    <stop offset="1" stop-color="rgba(106,88,216,0.35)"/>
  </linearGradient>
    <clipPath id="r"><rect width="512" height="512" rx="112" ry="112"/></clipPath>
  </defs>
  <g clip-path="url(#r)">
    <rect width="512" height="512" fill="url(#bg)"/>
    
  <!-- magnification ring -->
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.5"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="rgba(111,224,239,0.12)" stroke-width="14"/>
  <!-- crosshair (gap around the speck) -->
  <g stroke="rgba(138,180,206,0.45)" stroke-width="4" stroke-linecap="round">
    <line x1="256" y1="86"  x2="256" y2="196"/>
    <line x1="256" y1="316" x2="256" y2="426"/>
    <line x1="86"  y1="256" x2="196" y2="256"/>
    <line x1="316" y1="256" x2="426" y2="256"/>
  </g>
  <!-- reticle corner ticks -->
  <g stroke="#1596ad" stroke-width="10" stroke-linecap="round" opacity="0.85">
    <path d="M84 128 V84 H128" fill="none"/>
    <path d="M428 128 V84 H384" fill="none"/>
    <path d="M84 384 V428 H128" fill="none"/>
    <path d="M428 384 V428 H384" fill="none"/>
  </g>
  <!-- glowing speck: "you are here" -->
  <circle cx="256" cy="256" r="120" fill="url(#halo)"/>
  <circle cx="256" cy="256" r="46" fill="url(#spec)"/>
  <circle cx="240" cy="240" r="14" fill="rgba(255,255,255,0.65)"/>
    <rect x="1.5" y="1.5" width="509" height="509" rx="110.5" ry="110.5"
          fill="none" stroke="rgba(111,224,239,0.18)" stroke-width="3"/>
  </g>
</svg>